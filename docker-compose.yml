services:
  api:
    build: .
    container_name: chatbot-ia-api
    ports:
      - "8000:8000"
    # Carrega todas as env vars do .env diretamente no container.
    # Defaults (OPENAI_MODEL, OPENAI_TEMPERATURE, etc.) vivem em app/core/config.py.
    env_file:
      - .env
    restart: unless-stopped
